id: ai-document-bridge
name: AI Document Bridge
version: "1.0.0"
tagline: Automated AI categorization for Paperless-ngx
description: >
  A FastAPI-based bridge that connects Paperless-ngx to local AI (Ollama) or 
  Groq Cloud. It automatically extracts vendors, dates, and amounts to update 
  your document metadata.

	This is a work in progress. Mainly work on it during weekends when im off work and school.
  any suggestions are welcome.
	
	This was made with paperless-ai in mind, i wanted something that would use a visual ai to 
  be able to better get logos and hand writing. but i also made it to where if your local ai
  fails, crashes, or just your system in general is offline, it will still send it to Groq to get tags

