<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>AI Document Bridge</title>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">
    <nav class="border-b border-gray-800 p-4 bg-gray-900 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-500">AI Document Bridge</h1>
            <a href="/settings" class="text-gray-400 hover:text-white transition">Settings</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-sm uppercase tracking-wider font-semibold">Paperless-ngx</p>
                <div id="paperless-status" class="mt-2 text-2xl font-bold text-gray-500 italic">Checking...</div>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-sm uppercase tracking-wider font-semibold">Ollama AI</p>
                <div id="ollama-status" class="mt-2 text-2xl font-bold text-gray-500 italic">Checking...</div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg overflow-hidden">
            <div class="p-4 border-b border-gray-700 bg-gray-800/50">
                <h2 class="text-lg font-semibold">Recent Activity</h2>
            </div>
            <div class="p-12 text-center text-gray-500">
                <p>No documents processed yet. The bridge is standing by.</p>
            </div>
        </div>
    </main>

    <script>
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const services = ['paperless', 'ollama'];
                services.forEach(service => {
                    const el = document.getElementById(`${service}-status`);
                    const status = data[service];
                    el.innerText = status.toUpperCase();
                    
                    if (status === 'online') {
                        el.className = "mt-2 text-2xl font-bold text-green-500";
                    } else {
                        el.className = "mt-2 text-2xl font-bold text-red-500";
                    }
                });
            } catch (e) {
                console.error("Failed to fetch status");
            }
        }
        // Poll every 5 seconds
        setInterval(updateStatus, 5000);
        updateStatus();
    </script>
</body>
</html>
