<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bridge - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .nav { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .theme-toggle { padding: 8px 12px; border: 1px solid #888; border-radius: 6px; background: transparent; cursor: pointer; }
        .banner { padding: 10px 14px; border-radius: 8px; margin-bottom: 18px; }
        .table-container { overflow-x: auto; }

        body.dark { background: #10121a; color: #e5e9f0; }
        body.dark a { color: #8cb8ff; }
        body.dark select, body.dark textarea, body.dark input, body.dark button, body.dark form { background: #1b2232; color: #e5e9f0; border-color: #32406b; }
        body.dark button { background: #253650; color: #e5e9f0; }
        body.dark .banner { background: #17202a; }
        body.dark table { color: #e5e9f0; border-color: #2d3f61; }
        body.dark th, body.dark td { border-color: #2d3f61; }
        body.dark .theme-toggle { border-color: #5d7eb9; }
    </style>
</head>
<body>
    <div class="nav">
        <h1>📊 AI Activity</h1>
        <div>
            <button id="themeToggle" class="theme-toggle" type="button">Switch to Dark Mode</button>
            <a href="/settings">Settings</a> | <a href="/logout">Logout</a>
        </div>
    </div>

    <h3>🚀 Manual Analyze</h3>
    <form action="/analyze-manual" method="post" style="display:flex; gap:10px; align-items: flex-end;">
        <div style="flex-grow:1;">
            <select name="doc_id">
                {% if all_docs %}
                    {% for doc in all_docs %}
                        <option value="{{ doc.id }}">{{ doc.title }} (ID: {{ doc.id }})</option>
                    {% endfor %}
                {% else %}
                    <option>No documents found</option>
                {% endif %}
            </select>
        </div>
        <button type="submit">Analyze</button>
    </form>

    <hr>

    <div class="table-container">
        <table>
            <thead><tr><th>ID</th><th>Vendor</th><th>Amount</th><th>Method</th></tr></thead>
            <tbody>
                {% if history %}
                    {% for item in history %}
                        <tr>
                            <td>{{ item.doc_id }}</td>
                            <td>{{ item.vendor or 'N/A' }}</td>
                            <td>{{ item.amount or '0.00' }}</td>
                            <td>{{ item.method or 'Cloud' }}</td>
                        </tr>
                    {% endfor %}
                {% else %}
                    <tr><td colspan="4">Waiting for first document...</td></tr>
                {% endif %}
            </tbody>
        </table>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const setTheme = theme => {
            document.body.classList.toggle('dark', theme === 'dark');
            themeToggle.textContent = theme === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode';
        };
        const savedTheme = localStorage.getItem('ai_bridge_theme') || 'light';
        setTheme(savedTheme);
        themeToggle?.addEventListener('click', () => {
            const nextTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem('ai_bridge_theme', nextTheme);
            setTheme(nextTheme);
        });
    </script>
</body>
</html>
